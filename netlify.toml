[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/ws-api/*"
  to = "https://ws.narvar.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://ship-cdn.domain-ship.prod20.narvar.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/geo/*"
  to = "https://geo.prod20.narvar.com/:splat"
  status = 200
  force = true
